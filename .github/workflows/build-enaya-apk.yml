name: Build Enaya V3 APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract project
        run: |
          rm -rf extracted
          mkdir extracted
          unzip -q EnayaAssistant_V3_MobileBuild.zip -d extracted
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Build debug APK
        working-directory: extracted/EnayaAssistant
        run: gradle assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: Enaya-Assistant-V3-APK
          path: extracted/EnayaAssistant/app/build/outputs/apk/debug/app-debug.apk
          
